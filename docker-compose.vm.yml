services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: legaltech-web
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PORT: 3000
      HOSTNAME: 0.0.0.0
      LEGAL_LLM_ENABLED: "true"
      LEGAL_LLM_ENDPOINT: "http://ollama:11434/api/generate"
      LEGAL_VECTOR_STORE_URL: "http://qdrant:6333"
      LEGAL_OBJECT_STORAGE_ENDPOINT: "http://minio:9000"
    depends_on:
      - ollama
      - qdrant
      - minio
    ports:
      - "3000:3000"
    networks:
      - legaltech-net

  ollama:
    image: ollama/ollama:latest
    container_name: legaltech-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - legaltech-net

  qdrant:
    image: qdrant/qdrant:latest
    container_name: legaltech-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - legaltech-net

  minio:
    image: minio/minio:latest
    container_name: legaltech-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-legaltech}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-legaltech123}
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - legaltech-net

volumes:
  ollama_data:
  qdrant_data:
  minio_data:

networks:
  legaltech-net:
    driver: bridge
